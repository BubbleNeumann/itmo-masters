apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-agent
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: agent-pipeline
  template:
    metadata:
      labels:
        app: agent-pipeline
    spec:
      containers:
      - name: agent
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: 8000
        env:
        {{- range $key, $value := .Values.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        stdin: true
        tty: true
        resources:
          {{- toYaml .Values.resources | nindent 10 }}