replicaCount: 1
image:
  repository: mcp-clickhouse
  tag: latest
  pullPolicy: IfNotPresent

env:
  CLICKHOUSE_HOST: "clickhouse"
  CLICKHOUSE_PORT: "9000"
  CLICKHOUSE_USER: "default"
  CLICKHOUSE_PASSWORD: ""
  FASTMCP_JSON_RESPONSE: "true"

service:
  type: ClusterIP
  port: 8000

resources:
  requests:
    memory: "256Mi"
    cpu: "200m"
  limits:
    memory: "512Mi"
    cpu: "500m"