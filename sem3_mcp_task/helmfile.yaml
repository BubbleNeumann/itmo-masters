repositories:
  - name: bitnami
    url: https://charts.bitnami.com/bitnami

releases:
  # Infrastructure
  - name: kafka
    chart: bitnami/kafka
    version: 26.x.x  # latest compatible
    values:
      - persistence:
          enabled: true
        metrics:
          jmx:
            enabled: true  # observability

  - name: spark
    chart: bitnami/spark
    version: 9.x.x
    values:
      - metrics:
          enabled: true  # For monitoring

  - name: clickhouse
    chart: bitnami/clickhouse
    version: 6.x.x
    values:
      - metrics:
          enabled: true

  # # Your custom MCP servers
  # - name: mcp-kafka
  #   chart: ./charts/mcp-kafka  # You create this
  #   values:
